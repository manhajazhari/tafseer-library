<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبة التفسير القرآني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8860B;
    --gold-light: #9A6E00;
    --gold-dark: #7A5A00;
    --deep: #F7EDD8;
    --deep2: #F0E2C4;
    --panel: #FBF6EC;
    --cream: #3D2800;
    --cream2: #5C3D00;
    --text-main: #3D2800;
    --text-muted: #8B6420;
    --border-gold: rgba(184,134,11,0.45);
    --shadow-gold: 0 0 30px rgba(184,134,11,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Amiri', serif;
    background: linear-gradient(160deg, #F7EDD8 0%, #EFE0C0 50%, #F5E8CC 100%);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ═══════════════════════════════════════
     GEOMETRIC BACKGROUND PATTERN
  ═══════════════════════════════════════ */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      repeating-linear-gradient(60deg, transparent, transparent 40px, rgba(184,134,11,0.06) 40px, rgba(184,134,11,0.06) 41px),
      repeating-linear-gradient(-60deg, transparent, transparent 40px, rgba(184,134,11,0.06) 40px, rgba(184,134,11,0.06) 41px),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(184,134,11,0.04) 40px, rgba(184,134,11,0.04) 41px);
    pointer-events: none;
  }

  /* ═══════════════════════════════════════
     PASSWORD SCREEN
  ═══════════════════════════════════════ */
  #password-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(ellipse at center, #F5E8C8 0%, #E8D4A0 60%, #D4B870 100%);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
  }

  .pw-mandala {
    width: 180px; height: 180px;
    margin-bottom: 2rem;
    animation: rotateMandala 20s linear infinite;
  }

  @keyframes rotateMandala {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .pw-box {
    background: linear-gradient(145deg, rgba(255,250,238,0.97), rgba(245,235,210,0.99));
    border: 1px solid var(--border-gold);
    border-radius: 4px;
    padding: 3rem 3.5rem;
    text-align: center;
    max-width: 440px; width: 90%;
    box-shadow: 0 8px 50px rgba(184,134,11,0.22), 0 2px 12px rgba(0,0,0,0.08);
    position: relative;
  }

  .lang-switcher {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
  }

  .lang-icon {
    font-size: 1.8rem;
    opacity: 0.7;
  }

  .lang-btn {
    background: rgba(184,134,11,0.12);
    border: 1px solid var(--border-gold);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--gold-dark);
    font-family: 'Amiri', serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: all 0.3s;
  }

  .lang-btn:hover {
    background: rgba(184,134,11,0.25);
    border-color: var(--gold);
    transform: scale(1.05);
  }

  .lang-btn.active {
    background: var(--gold);
    color: #FFF8E8;
    border-color: var(--gold);
  }

  .pw-box::before, .pw-box::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 1.2rem;
    opacity: 0.6;
  }
  .pw-box::before { top: 12px; right: 18px; }
  .pw-box::after  { bottom: 12px; left: 18px; }

  .pw-title {
    font-family: 'Scheherazade New', serif;
    font-size: 2rem;
    color: var(--gold-dark);
    margin-bottom: 0.4rem;
    letter-spacing: 1px;
  }

  .pw-subtitle {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-bottom: 2rem;
  }

  .pw-ornament {
    color: var(--gold);
    font-size: 1.4rem;
    letter-spacing: 8px;
    margin-bottom: 1.8rem;
    opacity: 0.7;
  }

  .pw-input-wrap { position: relative; margin-bottom: 1.2rem; }

  .pw-input {
    width: 100%;
    background: rgba(184,134,11,0.07);
    border: 1px solid var(--border-gold);
    border-radius: 3px;
    padding: 0.85rem 1.2rem;
    color: var(--gold-dark);
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .pw-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(184,134,11,0.2);
  }

  .pw-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    background-size: 200% 100%;
    border: none; border-radius: 3px;
    padding: 0.85rem;
    color: #FFF8E8;
    font-family: 'Scheherazade New', serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: background-position 0.4s, transform 0.2s;
    letter-spacing: 1px;
  }

  .pw-btn:hover {
    background-position: 100% 0;
    transform: translateY(-1px);
  }

  .pw-error {
    color: #E57373;
    font-size: 0.9rem;
    margin-top: 0.8rem;
    min-height: 1.2rem;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .pw-error.show { opacity: 1; }

  /* ─── SEARCH BAR ─── */
  .search-container {
    position: relative;
    margin: 2rem 0;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
    z-index: 100;
  }

  .search-input {
    width: 100%;
    padding: 0.8rem 1.2rem 0.8rem 2.8rem;
    border: 1px solid var(--border-gold);
    border-radius: 25px;
    background: rgba(255,250,238,0.95);
    color: var(--text-main);
    font-family: 'Amiri', serif;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(184,134,11,0.1);
  }

  .search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 15px rgba(184,134,11,0.2);
    background: rgba(255,252,245,0.99);
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .search-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(255,250,238,0.98);
    border: 1px solid var(--border-gold);
    border-top: none;
    border-radius: 0 0 10px 10px;
    max-height: 300px;
    overflow-y: auto;
    box-shadow: 0 8px 20px rgba(184,134,11,0.15);
    display: none;
    z-index: 1000;
  }

  .search-dropdown.show {
    display: block;
  }

  .search-item {
    padding: 0.8rem 1.2rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(184,134,11,0.1);
    transition: background 0.2s;
    color: var(--text-main);
  }

  .search-item:hover {
    background: rgba(184,134,11,0.08);
    padding-right: 1rem;
  }

  .search-item-name {
    font-family: 'Scheherazade New', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold-dark);
  }

  .search-item-number {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* ═══════════════════════════════════════
     MAIN APP
  ═══════════════════════════════════════ */
  #app { display: none; position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  .site-header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    position: relative;
  }

  .header-border-top {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-dark), transparent);
    margin-bottom: 2rem;
  }

  .bismillah {
    font-family: 'Scheherazade New', serif;
    font-size: 2.2rem;
    color: var(--gold-dark);
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 8px rgba(184,134,11,0.2);
  }

  .site-title {
    font-family: 'Scheherazade New', serif;
    font-size: 3.2rem;
    color: var(--text-main);
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .site-subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    letter-spacing: 2px;
  }

  .header-divider {
    display: flex; align-items: center; gap: 1rem;
    justify-content: center;
    margin: 1.5rem auto;
    max-width: 500px;
  }

  .header-divider span {
    height: 1px;
    flex: 1;
    background: linear-gradient(90deg, transparent, var(--gold-dark));
  }
  .header-divider span:last-child {
    background: linear-gradient(270deg, transparent, var(--gold-dark));
  }

  .header-divider .gem {
    color: var(--gold);
    font-size: 1.2rem;
  }

  /* ─── JUZZ TABS ─── */
  .juzz-container {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  .section-label {
    text-align: center;
    font-family: 'Scheherazade New', serif;
    font-size: 1.4rem;
    color: var(--gold);
    margin-bottom: 2rem;
    letter-spacing: 3px;
  }

  .juzz-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 3rem;
  }

  .juzz-pill {
    position: relative;
    width: 130px; height: 90px;
    background: linear-gradient(145deg, rgba(255,250,238,0.95), rgba(245,235,210,0.98));
    border: 1px solid var(--border-gold);
    border-radius: 50px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
    transition: all 0.3s ease;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(184,134,11,0.12);
    padding: 0.5rem;
  }

  .juzz-num {
    font-family: 'Scheherazade New', serif;
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .juzz-label {
    font-family: 'Scheherazade New', serif;
    font-size: 1.1rem;
    color: var(--gold-dark);
    font-weight: 700;
    line-height: 1.3;
    text-align: center;
    word-wrap: break-word;
  }

  .juzz-pill::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .juzz-pill:hover::before,
  .juzz-pill.active::before { opacity: 1; }

  .juzz-pill:hover,
  .juzz-pill.active {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.3), inset 0 0 15px rgba(201,168,76,0.08);
    transform: translateY(-2px);
  }

  .juzz-pill.active {
    background: linear-gradient(145deg, rgba(184,134,11,0.18), rgba(122,90,0,0.12));
  }

  .juzz-pill.active .juzz-num,
  .juzz-pill:hover .juzz-num { color: var(--gold-dark); }

  .juzz-pill.empty {
    opacity: 0.25;
    cursor: default;
    pointer-events: none;
  }

  /* ─── SURAH CARDS PANEL ─── */
  .surah-panel {
    display: none;
    animation: fadeSlideIn 0.4s ease;
  }

  .surah-panel.active { display: block; }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .panel-juzz-title {
    font-family: 'Scheherazade New', serif;
    font-size: 1.8rem;
    color: var(--gold-dark);
  }

  .panel-ornament {
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 6px;
    opacity: 0.6;
    margin-top: 0.3rem;
  }

  .surah-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
  }

  .surah-card {
    background: linear-gradient(145deg, #FFFCF2, #F5EBD0);
    border: 1px solid var(--border-gold);
    border-radius: 6px;
    padding: 1rem 1.5rem;
    min-width: 160px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(184,134,11,0.1);
  }

  .surah-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .surah-card:hover::after { transform: scaleX(1); }

  .surah-card:hover {
    border-color: var(--gold);
    box-shadow: 0 6px 25px rgba(184,134,11,0.25);
    transform: translateY(-3px);
    background: linear-gradient(145deg, #FFF5D6, #F0DFA0);
  }

  .surah-number {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
  }

  .surah-name {
    font-family: 'Scheherazade New', serif;
    font-size: 1.3rem;
    color: var(--text-main);
    font-weight: 700;
  }

  .surah-card:hover .surah-name { color: var(--gold-dark); }

  /* ─── IFRAME VIEWER ─── */
  #viewer-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 8000;
    background: rgba(200,170,100,0.3);
    backdrop-filter: blur(4px);
    flex-direction: column;
  }

  #viewer-overlay.open { display: flex; }

  .viewer-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.8rem 1.5rem;
    background: linear-gradient(90deg, #F5E8C8, #EDD89A, #F5E8C8);
    border-bottom: 2px solid var(--gold);
    flex-shrink: 0;
  }

  .viewer-title {
    font-family: 'Scheherazade New', serif;
    font-size: 1.4rem;
    color: var(--gold-dark);
  }

  .viewer-close {
    background: rgba(184,134,11,0.12);
    border: 1px solid var(--border-gold);
    border-radius: 50%;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--gold-dark);
    font-size: 1.2rem;
    transition: all 0.2s;
  }

  .viewer-close:hover {
    background: rgba(184,134,11,0.25);
    transform: rotate(90deg);
  }

  #surah-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }

  /* ─── FOOTER ─── */
  .site-footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border-gold);
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* ─── CORNER ORNAMENTS ─── */
  .corner-ornament {
    position: fixed;
    width: 80px; height: 80px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 2;
  }
  .corner-ornament.tl { top: 0; right: 0; }
  .corner-ornament.br { bottom: 0; left: 0; transform: rotate(180deg); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #F0E2C4; }
  ::-webkit-scrollbar-thumb { background: #B8860B; border-radius: 3px; }

  @media (max-width: 600px) {
    .site-title { font-size: 2.2rem; }
    .juzz-pill { width: 88px; height: 50px; }
    .surah-card { min-width: 130px; }
    .pw-box { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════
     PASSWORD SCREEN
══════════════════════════════════ -->
<div id="password-screen">

  <!-- Mandala SVG -->
  <svg class="pw-mandala" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <g transform="translate(100,100)">
      <!-- Outer ring -->
      <circle r="90" fill="none" stroke="#7A5A00" stroke-width="0.5" opacity="0.4"/>
      <circle r="75" fill="none" stroke="#7A5A00" stroke-width="0.5" opacity="0.3"/>
      <circle r="55" fill="none" stroke="#7A5A00" stroke-width="0.5" opacity="0.3"/>
      <circle r="35" fill="none" stroke="#7A5A00" stroke-width="0.8" opacity="0.5"/>
      <!-- 8-pointed star outer -->
      <g opacity="0.6">
        <polygon points="0,-88 8,-8 88,0 8,8 0,88 -8,8 -88,0 -8,-8" fill="none" stroke="#7A5A00" stroke-width="0.8"/>
        <polygon points="0,-88 8,-8 88,0 8,8 0,88 -8,8 -88,0 -8,-8" fill="none" stroke="#7A5A00" stroke-width="0.8" transform="rotate(45)"/>
      </g>
      <!-- Inner 8-pointed star -->
      <g opacity="0.8">
        <polygon points="0,-52 5,-5 52,0 5,5 0,52 -5,5 -52,0 -5,-5" fill="none" stroke="#B8860B" stroke-width="1"/>
        <polygon points="0,-52 5,-5 52,0 5,5 0,52 -5,5 -52,0 -5,-5" fill="none" stroke="#B8860B" stroke-width="1" transform="rotate(45)"/>
      </g>
      <!-- Petal pattern -->
      <g opacity="0.5">
        <ellipse rx="10" ry="35" transform="rotate(0)"   fill="none" stroke="#7A5A00" stroke-width="0.7"/>
        <ellipse rx="10" ry="35" transform="rotate(45)"  fill="none" stroke="#7A5A00" stroke-width="0.7"/>
        <ellipse rx="10" ry="35" transform="rotate(90)"  fill="none" stroke="#7A5A00" stroke-width="0.7"/>
        <ellipse rx="10" ry="35" transform="rotate(135)" fill="none" stroke="#7A5A00" stroke-width="0.7"/>
      </g>
      <!-- Center gem -->
      <circle r="8" fill="none" stroke="#B8860B" stroke-width="1.5" opacity="0.9"/>
      <circle r="3" fill="#7A5A00" opacity="0.8"/>
      <!-- Dots on outer ring -->
      <g fill="#7A5A00" opacity="0.7">
        <circle cx="90" cy="0" r="2.5"/>
        <circle cx="-90" cy="0" r="2.5"/>
        <circle cx="0" cy="90" r="2.5"/>
        <circle cx="0" cy="-90" r="2.5"/>
        <circle cx="63.6" cy="63.6" r="2"/>
        <circle cx="-63.6" cy="63.6" r="2"/>
        <circle cx="63.6" cy="-63.6" r="2"/>
        <circle cx="-63.6" cy="-63.6" r="2"/>
      </g>
    </g>
  </svg>

  <div class="pw-box">
    <div class="lang-switcher">
      <span class="lang-icon">🌐</span>
      <button class="lang-btn active" data-lang="ar" onclick="switchLanguage('ar')">ع</button>
      <button class="lang-btn" data-lang="en" onclick="switchLanguage('en')">En</button>
    </div>
    <div class="pw-title">مكتبة التفسير القرآني</div>
    <div class="pw-subtitle">منصة دراسة القرآن الكريم وتفسيره</div>
    <div class="pw-ornament">❧ ✦ ❧</div>
    <div class="pw-input-wrap">
      <input class="pw-input" type="password" id="pw-field"
             placeholder="● ● ● ● ● ● ●"
             onkeydown="if(event.key==='Enter')checkPassword()">
    </div>
    <button class="pw-btn" onclick="checkPassword()">دخول المكتبة</button>
    <div class="pw-error" id="pw-error">كلمة المرور غير صحيحة — حاول مجدداً</div>
  </div>
</div>

<!-- ══════════════════════════════════
     MAIN APP
══════════════════════════════════ -->
<div id="app">

  <!-- Corner SVG ornaments -->
  <svg class="corner-ornament tl" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <path d="M80,0 Q40,0 40,40 Q40,80 80,80" fill="none" stroke="#B8860B" stroke-width="1"/>
    <path d="M80,10 Q50,10 50,40 Q50,70 80,70" fill="none" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="80" cy="0" r="3" fill="#B8860B"/>
    <circle cx="80" cy="80" r="3" fill="#B8860B"/>
    <circle cx="40" cy="40" r="2" fill="#B8860B"/>
  </svg>
  <svg class="corner-ornament br" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <path d="M80,0 Q40,0 40,40 Q40,80 80,80" fill="none" stroke="#B8860B" stroke-width="1"/>
    <path d="M80,10 Q50,10 50,40 Q50,70 80,70" fill="none" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="80" cy="0" r="3" fill="#B8860B"/>
    <circle cx="80" cy="80" r="3" fill="#B8860B"/>
    <circle cx="40" cy="40" r="2" fill="#B8860B"/>
  </svg>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-border-top"></div>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>

const HASH = "ac52c23cc97553b000c6b4f7b2a01fea8148f01bf2d8164a340a77cd39932f02";

async function sha256(msg) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const val = document.getElementById('pw-field').value;
  const h = await sha256(val);
  if (h === HASH) {

}

// ══════════════════════════════════════════════
//  LEVENSHTEIN DISTANCE - for fuzzy search
// ══════════════════════════════════════════════
function levenshteinDistance(str1, str2) {
  const matrix = [];
  for (let i = 0; i <= str2.length; i++) {
    matrix[i] = [i];
  }
  for (let j = 0; j <= str1.length; j++) {
    matrix[0][j] = j;
  }
  for (let i = 1; i <= str2.length; i++) {
    for (let j = 1; j <= str1.length; j++) {
      if (str2.charAt(i - 1) === str1.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }
  return matrix[str2.length][str1.length];
}

// ══════════════════════════════════════════════
//  SEARCH FUNCTIONALITY
// ══════════════════════════════════════════════
function handleSearch(query) {
  if (query.length < 2) {
    hideSearchDropdown();
    return;
  }
  
  const results = SURAHS.map(([num, name, enc, juzz]) => {
    const normalizedQuery = query.trim();
    const normalizedName = name;
    
    let score = 0;
    if (normalizedName.includes(normalizedQuery)) {
      score = 1000 - normalizedName.indexOf(normalizedQuery);
    } else {
      score = 50 - levenshteinDistance(normalizedQuery, normalizedName);
    }
    
    return { num, name, enc, juzz, score };
  })
  .filter(item => item.score > 0)
  .sort((a, b) => b.score - a.score)
  .slice(0, 10);
  
  const dropdown = document.getElementById('search-dropdown');
  if (results.length === 0) {
    dropdown.innerHTML = '<div class="search-item" style="text-align:center;color:var(--text-muted);">لم يتم العثور على نتائج</div>';
  } else {
    dropdown.innerHTML = results.map(r => `
      <div class="search-item" onclick="selectSurah('${r.enc}','${r.name}','${r.num}')">
        <div class="search-item-name">${r.name}</div>
        <div class="search-item-number">سورة ${r.num}</div>
      </div>
    `).join('');
  }
  
  dropdown.classList.add('show');
}

function showSearchDropdown() {
  const val = document.getElementById('search-input').value;
  if (val.length >= 2) {
    document.getElementById('search-dropdown').classList.add('show');
  }
}

function hideSearchDropdown() {
  document.getElementById('search-dropdown').classList.remove('show');
  document.getElementById('search-dropdown').innerHTML = '';
}

function selectSurah(enc, name, num) {
  document.getElementById('search-input').value = name;
  openSurah(enc, name);
  hideSearchDropdown();
}
